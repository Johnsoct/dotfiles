[debug]
persistent_logging = true
log_level = "Debug"
print_events = true

[general]
import = [
    "./theme.toml",
]
live_config_reload = true

[env]
TERM = "xterm-256color"

[font]
normal = { family = "DankMono Nerd Font", style = "Regular" }
bold = { family = "DankMono Nerd Font", style = "Regular" }
italic = { family = "DankMono Nerd Font", style = "Italic" }
offset = { y = 0 }
size = 20

[terminal]
# shell = { program = "wsl", args = ["~", "-e", "zellij"] }
shell = { program = "/opt/homebrew/bin/bash", args = ["--login" ] }

[window]
blur = true
decorations = "None"
dynamic_padding = true
opacity = 1
padding = { x = 0, y = 0 }
option_as_alt = "Both"
startup_mode = "Maximized"
